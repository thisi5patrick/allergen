{% extends "settings/base.html" %}
{% load static %}
{% block user_content %}
    <div class="symptoms-management">
        <div class="mb-6">
            <h2 class="text-2xl font-bold text-gray-800 mb-4">Your Symptoms</h2>
            <p class="text-gray-600 mb-6">Manage your tracked symptoms and add new ones to monitor.</p>
            <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-4 mb-6">
                <h3 class="text-lg font-semibold text-gray-800 mb-3">Add New Symptom</h3>
                <div id="add-symptom-form-container"
                     hx-get="{% url 'settings:partial_new_symptom_type_form' %}"
                     hx-trigger="load"
                     hx-swap="innerHTML"></div>
            </div>
            <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-4">
                <h3 class="text-lg font-semibold text-gray-800 mb-4">Your Tracked Symptoms</h3>
                <div id="symptoms-list-outer-container">
                    <div id="existing-symptoms-container"
                         hx-get="{% url 'settings:partial_existing_symptoms' %}"
                         hx-trigger="load"
                         hx-swap="innerHTML"></div>
                </div>
            </div>
        </div>
    </div>
    <div id="delete-symptom-modal"
         class="fixed inset-0 z-50 hidden items-center justify-center bg-gray-900/50 px-4">
        <div class="w-full max-w-md rounded-2xl bg-white p-6 shadow-2xl">
            <div class="mb-4 flex items-start gap-4">
                <div class="flex h-12 w-12 shrink-0 items-center justify-center rounded-full bg-red-100 text-red-600">
                    <i class="fas fa-triangle-exclamation text-lg"></i>
                </div>
                <div>
                    <h3 class="text-lg font-semibold text-gray-900">Delete symptom?</h3>
                    <p class="mt-2 text-sm leading-6 text-gray-600">
                        This will remove <span id="delete-symptom-name" class="font-semibold text-gray-800"></span> and all
                        related tracked entries.
                    </p>
                </div>
            </div>
            <div class="flex justify-end gap-3">
                <button type="button"
                        id="cancel-delete-symptom"
                        class="rounded-md border border-gray-300 px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50">
                    Cancel
                </button>
                <button type="button"
                        id="confirm-delete-symptom"
                        class="rounded-md bg-red-600 px-4 py-2 text-sm font-medium text-white hover:bg-red-700">
                    Delete
                </button>
            </div>
        </div>
    </div>
    <script>
        (() => {
            const modal = document.getElementById("delete-symptom-modal");
            const symptomName = document.getElementById("delete-symptom-name");
            const confirmButton = document.getElementById("confirm-delete-symptom");
            const cancelButton = document.getElementById("cancel-delete-symptom");
            const symptomsContainer = document.getElementById("symptoms-list-outer-container");

            if (!modal || !symptomName || !confirmButton || !cancelButton || !symptomsContainer) {
                return;
            }

            let pendingDelete = null;

            const closeModal = () => {
                pendingDelete = null;
                modal.classList.add("hidden");
                modal.classList.remove("flex");
            };

            symptomsContainer.addEventListener("click", (event) => {
                const trigger = event.target.closest("[data-delete-symptom-url]");
                if (!trigger) {
                    return;
                }

                event.preventDefault();
                pendingDelete = {
                    url: trigger.getAttribute("data-delete-symptom-url"),
                    csrf: trigger.getAttribute("data-csrf-token"),
                };
                symptomName.textContent = trigger.getAttribute("data-symptom-name") || "this symptom";
                modal.classList.remove("hidden");
                modal.classList.add("flex");
            });

            cancelButton.addEventListener("click", closeModal);

            modal.addEventListener("click", (event) => {
                if (event.target === modal) {
                    closeModal();
                }
            });

            confirmButton.addEventListener("click", () => {
                if (!pendingDelete) {
                    return;
                }

                htmx.ajax("DELETE", pendingDelete.url, {
                    target: "#existing-symptoms-container",
                    swap: "innerHTML",
                    headers: {
                        "X-CSRFToken": pendingDelete.csrf,
                    },
                });
                closeModal();
            });
        })();
    </script>
{% endblock user_content %}
