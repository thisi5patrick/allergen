{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Allergen</title>
        <meta name="description" content="A tool for allergies management">
        <meta name="keywords" content="allergy">
        <link rel="shortcut icon" href="{% static 'favicon.ico' %}">
        <script src="https://unpkg.com/htmx.org@1.9.6"></script>
        <script src="https://cdn.tailwindcss.com"></script>
        <link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.css"
              rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>
        <link rel="stylesheet"
              href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        {{ form.media.css }}
    </head>
    <body class="bg-gray-100 min-h-screen">
        <div class="flex min-h-screen w-full flex-col">
            {% block content %}
            {% endblock content %}
        </div>
        {% include "partials/confirm_modal.html" %}
        {{ form.media }}
        <script>
            (() => {
                const modal = document.getElementById("confirm-modal");
                const title = document.getElementById("confirm-modal-title");
                const message = document.getElementById("confirm-modal-message");
                const cancelButton = document.getElementById("confirm-modal-cancel");
                const confirmButton = document.getElementById("confirm-modal-submit");

                if (!modal || !title || !message || !cancelButton || !confirmButton) {
                    return;
                }

                let pendingAction = null;

                const closeModal = () => {
                    pendingAction = null;
                    modal.classList.add("hidden");
                    modal.classList.remove("flex");
                };

                document.body.addEventListener("click", (event) => {
                    const trigger = event.target.closest("[data-confirm-url]");
                    if (!trigger) {
                        return;
                    }

                    event.preventDefault();
                    pendingAction = {
                        method: trigger.getAttribute("data-confirm-method") || "POST",
                        url: trigger.getAttribute("data-confirm-url"),
                        target: trigger.getAttribute("data-confirm-target"),
                        swap: trigger.getAttribute("data-confirm-swap") || "innerHTML",
                        csrf: trigger.getAttribute("data-confirm-csrf"),
                    };
                    title.textContent = trigger.getAttribute("data-confirm-title") || "Confirm action";
                    message.textContent = trigger.getAttribute("data-confirm-message") || "";
                    confirmButton.textContent = trigger.getAttribute("data-confirm-button") || "Confirm";
                    modal.classList.remove("hidden");
                    modal.classList.add("flex");
                });

                cancelButton.addEventListener("click", closeModal);

                modal.addEventListener("click", (event) => {
                    if (event.target === modal) {
                        closeModal();
                    }
                });

                confirmButton.addEventListener("click", () => {
                    if (!pendingAction || !pendingAction.url || !pendingAction.target) {
                        closeModal();
                        return;
                    }

                    const headers = {};
                    if (pendingAction.csrf) {
                        headers["X-CSRFToken"] = pendingAction.csrf;
                    }

                    htmx.ajax(pendingAction.method, pendingAction.url, {
                        target: pendingAction.target,
                        swap: pendingAction.swap,
                        headers,
                    });
                    closeModal();
                });
            })();
        </script>
    </body>
</html>
