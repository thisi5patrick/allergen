<div id="confirm-modal"
     class="fixed inset-0 z-50 hidden items-center justify-center bg-gray-900/50 px-4">
    <div class="w-full max-w-md rounded-2xl bg-white p-6 shadow-2xl">
        <div class="mb-4 flex items-start gap-4">
            <div class="flex h-12 w-12 shrink-0 items-center justify-center rounded-full bg-red-100 text-red-600">
                <i class="fas fa-triangle-exclamation text-lg"></i>
            </div>
            <div>
                <h3 id="confirm-modal-title" class="text-lg font-semibold text-gray-900">Confirm action</h3>
                <p id="confirm-modal-message"
                   class="mt-2 text-sm leading-6 text-gray-600"></p>
            </div>
        </div>
        <div class="flex justify-end gap-3">
            <button type="button"
                    id="confirm-modal-cancel"
                    class="rounded-md border border-gray-300 px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50">
                Cancel
            </button>
            <button type="button"
                    id="confirm-modal-submit"
                    class="rounded-md bg-red-600 px-4 py-2 text-sm font-medium text-white hover:bg-red-700">
                Confirm
            </button>
        </div>
    </div>
</div>
